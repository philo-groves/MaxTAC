version: 1
auditors:
  - id: xnu-iokit-mig-auditor
    display_name: XNU IOKit and MIG Auditor
    platforms: [xnu, mach-o]
    target_kinds: [kernel-source, kernel-extension-source, macho, patch-diff]
    surfaces: [iokit, mig, userclient, external-method, entitlement, ipc]
    bug_classes: [memory-safety, authorization, info-disclosure, type-confusion, sandbox-escape]
    disabled_for: [linux-kernel, web-app]
    required_inputs: [target-profile, source-or-symbols]
    focus: >
      Audit user-kernel entry points exposed through IOKit userclients and MIG
      interfaces. Prioritize external method dispatch, selector tables, scalar
      and struct input validation, entitlement checks, object ownership,
      async callbacks, and lifetime rules.
    search_seeds:
      - externalMethod
      - IOExternalMethodDispatch
      - IOConnectCall
      - MIG
      - mach_msg
      - entitlement
      - copyin
      - copyout
  - id: xnu-vfs-sandbox-auditor
    display_name: XNU VFS and Sandbox Auditor
    platforms: [xnu, mach-o]
    target_kinds: [kernel-source, kernel-extension-source, native-source, patch-diff]
    surfaces: [vfs, sandbox, mac-policy, vnode, path, symlink]
    bug_classes: [authorization, sandbox-escape, path-traversal, confused-deputy, race]
    disabled_for: [linux-kernel, web-app]
    required_inputs: [target-profile, source-or-diff]
    focus: >
      Audit file and policy boundaries: vnode lookup, path canonicalization,
      MAC hooks, sandbox checks, reparse-like behavior, symlink handling,
      mount/device namespace assumptions, and time-of-check/time-of-use gaps.
    search_seeds:
      - vnode
      - namei
      - sandbox
      - mac_policy
      - kauth
      - symlink
      - realpath
      - VNOP
  - id: xnu-memory-lifetime-auditor
    display_name: XNU Memory and Lifetime Auditor
    platforms: [xnu, mach-o]
    target_kinds: [kernel-source, kernel-extension-source, native-source, crash, patch-diff]
    surfaces: [refcount, lock, async, callback, object-lifetime, zone]
    bug_classes: [use-after-free, double-free, race, type-confusion, info-disclosure]
    disabled_for: [linux-kernel, web-app]
    required_inputs: [target-profile, source-or-crash]
    focus: >
      Audit ownership transitions, reference counting, lock ordering, async
      completion paths, destructor behavior, zone allocation assumptions, and
      stale pointer reuse around attacker-triggerable paths.
    search_seeds:
      - retain
      - release
      - refcount
      - lck_
      - IOLock
      - zalloc
      - free
      - async
  - id: xnu-kernel-parser-auditor
    display_name: XNU Kernel Parser Auditor
    platforms: [xnu, mach-o]
    target_kinds: [kernel-source, kernel-extension-source, native-source, crash]
    surfaces: [parser, network, file-format, length-field, integer, copyin]
    bug_classes: [memory-safety, integer-overflow, bounds, denial-of-service, info-disclosure]
    disabled_for: [linux-kernel, web-app]
    required_inputs: [target-profile, source-or-crash-or-format-notes]
    focus: >
      Audit kernel-reachable parsers and structured inputs. Prioritize length
      fields, integer conversions, nested records, recursion, copyin/copyout,
      allocation sizes, and differences between validation and use.
    search_seeds:
      - parse
      - decode
      - length
      - size
      - copyin
      - ntoh
      - bcopy
      - memcpy
  - id: windows-driver-ioctl-auditor
    display_name: Windows Driver IOCTL Auditor
    platforms: [windows, pe]
    target_kinds: [driver-source, driver-binary, pe, patch-diff]
    surfaces: [ioctl, irp, device-object, user-kernel-copy, dispatch]
    bug_classes: [memory-safety, privilege-escalation, info-disclosure, authorization]
    disabled_for: [linux-kernel, web-app]
    required_inputs: [target-profile, driver-source-or-binary]
    focus: >
      Audit WDM/KMDF dispatch and IOCTL handling. Prioritize access checks,
      METHOD_NEITHER risks, buffer length validation, user pointer probing,
      output disclosure, device ACLs, and caller privilege assumptions.
    search_seeds:
      - IRP_MJ_DEVICE_CONTROL
      - IOCTL
      - METHOD_NEITHER
      - ProbeForRead
      - ProbeForWrite
      - IoControlCode
      - WdfRequest
      - DeviceIoControl
  - id: windows-object-token-auditor
    display_name: Windows Object and Token Auditor
    platforms: [windows, pe]
    target_kinds: [driver-source, driver-binary, native-source, pe, patch-diff]
    surfaces: [object-manager, token, handle, acl, impersonation, privilege]
    bug_classes: [privilege-escalation, authorization, confused-deputy, info-disclosure]
    disabled_for: [linux-kernel, web-app]
    required_inputs: [target-profile, source-or-binary]
    focus: >
      Audit handle, object, ACL, security descriptor, token, impersonation, and
      Se* privilege checks. Prioritize confused deputy paths and mismatches
      between caller, subject context, and object owner.
    search_seeds:
      - SeAccessCheck
      - ObReferenceObject
      - PsReferenceImpersonationToken
      - Impersonate
      - SECURITY_DESCRIPTOR
      - AccessCheck
      - TOKEN_
      - SeSinglePrivilegeCheck
  - id: windows-kernel-memory-auditor
    display_name: Windows Kernel Memory Auditor
    platforms: [windows, pe]
    target_kinds: [driver-source, driver-binary, pe, crash, patch-diff]
    surfaces: [pool, mdl, refcount, lookaside, callback, race, user-kernel-copy]
    bug_classes: [use-after-free, double-free, pool-overflow, type-confusion, race, info-disclosure]
    disabled_for: [linux-kernel, web-app]
    required_inputs: [target-profile, source-or-binary-or-crash]
    focus: >
      Audit pool allocation, MDL handling, lookaside lists, refcounts, callback
      registration, cancellation paths, locking, and user/kernel copy patterns.
    search_seeds:
      - ExAllocatePool
      - ExFreePool
      - MmProbeAndLockPages
      - IoAllocateMdl
      - Interlocked
      - LIST_ENTRY
      - RtlCopyMemory
      - CancelRoutine
  - id: windows-filter-filesystem-auditor
    display_name: Windows Filter and Filesystem Auditor
    platforms: [windows, pe]
    target_kinds: [driver-source, driver-binary, native-source, pe, patch-diff]
    surfaces: [minifilter, filesystem, path, reparse-point, mount, symlink]
    bug_classes: [authorization, path-confusion, race, sandbox-escape, privilege-escalation]
    disabled_for: [linux-kernel, web-app]
    required_inputs: [target-profile, filter-source-or-binary]
    focus: >
      Audit minifilter and filesystem trust boundaries. Prioritize reparse
      points, mount/device namespaces, normalized vs final paths, oplock/race
      windows, and privileged file operations on attacker-controlled paths.
    search_seeds:
      - FltRegisterFilter
      - FltGetFileNameInformation
      - reparse
      - FILE_OPEN_REPARSE_POINT
      - ZwCreateFile
      - IoCreateSymbolicLink
      - normalized
      - oplock
  - id: binary-patch-diff-auditor
    display_name: Binary Patch Diff Auditor
    platforms: [mach-o, pe, native, windows, xnu]
    target_kinds: [macho, pe, driver-binary, patch-diff]
    surfaces: [patch-diff, guard, parser, authz, memory]
    bug_classes: [variant-analysis, memory-safety, authorization, info-disclosure]
    disabled_for: [linux-kernel, web-app]
    required_inputs: [old-binary, new-binary-or-diff, symbols-when-available]
    focus: >
      Compare vulnerable and fixed artifacts to identify changed functions,
      new guards, length checks, authorization checks, constants, and call graph
      shifts. Produce candidate root causes and variant targets.
    search_seeds:
      - changed functions
      - new branch
      - bounds check
      - entitlement check
      - ProbeForRead
      - length clamp
  - id: native-parser-fuzzability-auditor
    display_name: Native Parser Fuzzability Auditor
    platforms: [native, xnu, windows, mach-o, pe]
    target_kinds: [native-source, kernel-source, driver-source, macho, pe, crash]
    surfaces: [parser, codec, archive, protocol, syscall, ioctl, file-format]
    bug_classes: [fuzzability, memory-safety, integer-overflow, bounds, crash]
    disabled_for: [linux-kernel, web-app]
    required_inputs: [target-profile, source-or-binary, seeds-or-format-notes-when-available]
    focus: >
      Decide whether fuzzing is justified and identify the smallest valuable
      harness boundary. Prioritize deterministic parser APIs with reachable
      attacker-controlled input, useful oracles, and available seeds.
    search_seeds:
      - parse
      - decode
      - load
      - import
      - Deserialize
      - FuzzedDataProvider
      - LLVMFuzzerTestOneInput
  - id: crash-root-cause-auditor
    display_name: Crash Root Cause Auditor
    platforms: [xnu, windows, mach-o, pe, native]
    target_kinds: [crash, driver-binary, macho, pe, native-source]
    surfaces: [crash, stack, sanitizer, debugger, minidump, panic]
    bug_classes: [root-cause, exploitability-triage, memory-safety, denial-of-service]
    disabled_for: [linux-kernel, web-app]
    required_inputs: [crash-log-or-dump, artifact-identity, reproduction-when-available]
    focus: >
      Classify crash evidence into root-cause leads. Prioritize controlled
      input, faulting address, stack ownership, memory operation, reachable
      privilege boundary, deduplication, and whether the crash implies a
      security-relevant primitive.
    search_seeds:
      - EXCEPTION
      - bugcheck
      - panic
      - KASAN
      - ASAN
      - fault
      - access violation
      - use-after-free
  - id: oss-systems-code-auditor
    display_name: Open Source Systems Code Auditor
    platforms: [oss, native]
    target_kinds: [native-source, patch-diff, crash]
    surfaces: [parser, ipc, plugin-loading, installer, updater, privileged-helper, filesystem]
    bug_classes: [memory-safety, authorization, path-traversal, command-injection, supply-chain, sandbox-escape]
    disabled_for: [linux-kernel, web-app]
    required_inputs: [target-profile, source-root]
    focus: >
      Audit open-source systems code that bridges untrusted input to native
      memory, filesystem effects, IPC, installers, update paths, plugins,
      privileged helpers, or sandbox boundaries.
    search_seeds:
      - unsafe
      - memcpy
      - exec
      - plugin
      - update
      - installer
      - path
      - IPC
